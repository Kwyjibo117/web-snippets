<!--
  Play-Seite Gallery
  ==================
  Masonry-Layout (CSS column-count) für ~70 Bilder.
  - Bilder behalten ihr natürliches Seitenverhältnis
  - Querformate werden proportional vergrößert (mehr visuelle Präsenz)
  - Zufällige Größen-Variation (90-120%) und horizontale Verschiebungen
  - Maus-Parallax in X und Y (Bilder bewegen sich entgegen der Maus)
  - Seed-basiertes Random für reproduzierbare Layouts
  
  Einbau: Semplice → Custom Code / HTML-Modul
  Bilder-URLs in der `images`-Array eintragen
-->

<style>
  .play-grid-wrap {
    position: relative;
    width: 100%;
    padding: 4vw 3vw;
    overflow: hidden;
  }
  .play-grid {
    column-count: 5;
    column-gap: 1.5vw;
  }
  .play-item {
    display: block;
    width: 100%;
    margin-bottom: 1.5vw;
    break-inside: avoid;
    will-change: transform;
    position: relative;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .play-item img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 4px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .play-item:hover {
    z-index: 10;
  }
  .play-item:hover img {
    transform: scale(1.12);
  }
  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    z-index: 1000;
    transition: background 0.4s ease, backdrop-filter 0.4s ease, -webkit-backdrop-filter 0.4s ease;
  }
  .lightbox-overlay--open {
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .lightbox-img {
    position: fixed;
    display: block;
    border-radius: 6px;
    pointer-events: none;
    will-change: transform;
  }

  @media (max-width: 1200px) {
    .play-grid { column-count: 4; }
  }
  @media (max-width: 900px) {
    .play-grid { column-count: 3; column-gap: 2vw; }
    .play-item { margin-bottom: 2vw; }
  }
  @media (max-width: 600px) {
    .play-grid { column-count: 3; }
  }
</style>

<div class="play-grid-wrap">
  <div class="play-grid" id="playGrid"></div>
</div>

  // =================================

  // Random seed bei jedem Laden → andere Reihenfolge und Layout-Verteilung
  var seed = Math.floor(Math.random() * 233280);
  function rnd() {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }

  // Bilder-Array mischen (Fisher-Yates)
  for (var i = images.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = images[i]; images[i] = images[j]; images[j] = tmp;
  }

  // Layout-Settings: Desktop vs. Mobile (≤ 768px)
  var isMobile = window.innerWidth <= 768;
  var lc = isMobile ? {
    paddingX:   '2vw',
    scaleMult:  0.95,
    shiftX:     20,    // ± %
    shiftY:     5,     // ± vw
    boostCap:   1.4
  } : {
    paddingX:   '19vw',
    scaleMult:  1.25,
    shiftX:     10,    // ± %
    shiftY:     6,     // ± vw
    boostCap:   1.8
  };

  var wrap = document.querySelector('.play-grid-wrap');
  wrap.style.padding = (lc.shiftY + 4) + 'vw ' + lc.paddingX;

  var grid = document.getElementById('playGrid');
  var items = [];

  images.forEach(function(entry) {
    var item = document.createElement('div');
    item.className = 'play-item';

    // Größen-Skalierung: 100–120% × masterScale
    var scale = (1.0 + rnd() * 0.2) * lc.scaleMult;
    var rawWidth = scale * 100;

    // Querformat-Boost direkt beim Bauen — ratio ist bekannt, kein Reflow nach dem Laden
    if (entry.ratio > 1) {
      rawWidth = rawWidth * Math.min(entry.ratio, lc.boostCap);
    }
    item.style.width = rawWidth.toFixed(1) + '%';

    // Horizontaler Versatz — Overflow wird mittig verteilt
    var shiftX = rnd() * lc.shiftX * 2 - lc.shiftX;
    item.style.marginLeft = (shiftX - (rawWidth - 100) / 2).toFixed(1) + '%';

    // Vertikaler Versatz: ± lc.shiftY vw (visuell, ohne Flow-Einfluss)
    var shiftY = (rnd() * lc.shiftY * 2 - lc.shiftY).toFixed(2);
    item.style.top = shiftY + 'vw';

    var img = document.createElement('img');
    img.alt = '';
    // width/height-Attribute reservieren den Platz vor dem Laden → kein Layout-Sprung
    img.width = Math.round(entry.ratio * 1000);
    img.height = 1000;
    img.loading = 'lazy';
    img.decoding = 'async';

    img.addEventListener('load', function() {
      // Erst einblenden wenn Bild tatsächlich geladen ist
      item.style.transitionDelay = Math.floor(Math.random() * 500) + 'ms';
      item.style.opacity = '1';
      setTimeout(function() { item.style.transitionDelay = ''; }, 700);
    });

    img.src = entry.src;
    item.appendChild(img);

    img.addEventListener('click', function() { openLightbox(img); });

    grid.appendChild(item);
    items.push({
      el: item,
      strength: 15 + rnd() * 45,  // Maus-Parallax-Stärke pro Bild: 15-60 Pixel
      visible: true
    });
  });

  // Nur Items im (erweiterten) Viewport bekommen Parallax-Updates —
  // in Semplice ist die Gallery Teil einer langen Seite
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        var rec = items[parseInt(e.target.dataset.idx, 10)];
        rec.visible = e.isIntersecting;
        if (rec.visible) applyTransform(rec);
      });
    }, { rootMargin: '200px' });
    items.forEach(function(rec, idx) {
      rec.visible = false;
      rec.el.dataset.idx = idx;
      io.observe(rec.el);
    });
  }

  // Parallax erst nach dem Intro aktivieren
  var parallaxReady = false;
  setTimeout(function() { parallaxReady = true; }, 1200);

  // Lightbox mit FLIP-Animation
  function openLightbox(img) {
    var rect = img.getBoundingClientRect();

    // Zielgröße berechnen (Seitenverhältnis beibehalten, max 88vw/88vh)
    var maxW = window.innerWidth * 0.88;
    var maxH = window.innerHeight * 0.88;
    var ratio = img.naturalWidth / img.naturalHeight;
    var finalW = ratio > maxW / maxH ? maxW : maxH * ratio;
    var finalH = ratio > maxW / maxH ? maxW / ratio : maxH;
    var finalLeft = (window.innerWidth  - finalW) / 2;
    var finalTop  = (window.innerHeight - finalH) / 2;

    // FLIP: Versatz von Ziel- zur Startposition
    var tx = rect.left + rect.width  / 2 - (finalLeft + finalW / 2);
    var ty = rect.top  + rect.height / 2 - (finalTop  + finalH / 2);
    var sx = rect.width  / finalW;
    var sy = rect.height / finalH;

    var overlay = document.createElement('div');
    overlay.className = 'lightbox-overlay';

    var lbImg = document.createElement('img');
    lbImg.src = img.src;
    lbImg.className = 'lightbox-img';
    lbImg.style.width  = finalW + 'px';
    lbImg.style.height = finalH + 'px';
    lbImg.style.left   = finalLeft + 'px';
    lbImg.style.top    = finalTop  + 'px';
    lbImg.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + sx + ',' + sy + ')';

    overlay.appendChild(lbImg);
    document.body.appendChild(overlay);
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    lightboxOpen = true;

    // Zwei rAF-Frames: sicherstellen dass Browser die Startposition gerendert hat
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.classList.add('lightbox-overlay--open');
        lbImg.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.4, 0.64, 1)';
        lbImg.style.transform  = 'translate(0,0) scale(1)';
      });
    });

    function close() {
      lightboxOpen = false;
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      overlay.classList.remove('lightbox-overlay--open');
      lbImg.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      lbImg.style.transform  = 'translate(' + tx + 'px,' + ty + 'px) scale(' + sx + ',' + sy + ')';
      lbImg.addEventListener('transitionend', function() {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      }, { once: true });
      document.removeEventListener('keydown', onKey);
    }

    overlay.addEventListener('click', close);
    function onKey(e) { if (e.key === 'Escape') close(); }
    document.addEventListener('keydown', onKey);
  }

  // Maus-Parallax (X und Y)
  var mouseX = 0, mouseY = 0;
  var targetX = 0, targetY = 0;
  var lightboxOpen = false;
  var mouseCaptured = false;
  var parallaxStrength = 0;

  function applyTransform(rec) {
    var strength = rec.strength * parallaxStrength;
    var xOffset = -mouseX * strength;
    var yOffset = -mouseY * strength;
    rec.el.style.transform = 'translate3d(' + xOffset.toFixed(1) + 'px, ' + yOffset.toFixed(1) + 'px, 0)';
  }

  function update() {
    for (var k = 0; k < items.length; k++) {
      if (items[k].visible) applyTransform(items[k]);
    }
  }

  var isTouchDevice = window.matchMedia('(pointer: coarse)').matches;

  if (!isTouchDevice) {
    document.addEventListener('mousemove', function(e) {
      if (!parallaxReady) return;
      targetX = (e.clientX / window.innerWidth - 0.5) * 2;
      targetY = (e.clientY / window.innerHeight - 0.5) * 2;
      mouseCaptured = true;
    }, true);
    document.addEventListener('mouseleave', function() {
      targetX = 0;
      targetY = 0;
    });
  } else {
    // Mobile: Touch-Position wie Maus-Parallax, bei Loslassen zurück zur Mitte
    document.addEventListener('touchmove', function(e) {
      if (!parallaxReady) return;
      var touch = e.touches[0];
      targetX = (touch.clientX / window.innerWidth  - 0.5) * 2;
      targetY = (touch.clientY / window.innerHeight - 0.5) * 2;
      mouseCaptured = true;
    }, { passive: true });

    document.addEventListener('touchend', function() {
      targetX = 0;
      targetY = 0;
    }, { passive: true });
  }

  var settled = false;

  function loop() {
    if (parallaxReady) {
      var easingIn = mouseCaptured && parallaxStrength < 1;
      if (easingIn) {
        parallaxStrength += (1 - parallaxStrength) * 0.03;
        if (parallaxStrength > 0.999) parallaxStrength = 1;
      }
      var dx = targetX - mouseX;
      var dy = targetY - mouseY;
      if (!easingIn && Math.abs(dx) < 0.0005 && Math.abs(dy) < 0.0005) {
        // Maus ruht: einmal final positionieren, danach keine Style-Writes mehr
        if (!settled) {
          mouseX = targetX;
          mouseY = targetY;
          update();
          settled = true;
        }
      } else {
        settled = false;
        mouseX += dx * 0.08;
        mouseY += dy * 0.08;
        update();
      }
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
