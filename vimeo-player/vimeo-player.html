<!--
  Vimeo Custom Player für Semplice
  ================================
  - Desktop: Custom Controls (Progressbar, Fullscreen-Button, Auto-Hide)
  - Mobile: Vimeos eigene Controls (für Sound & Fullscreen-Kompatibilität)
  - Custom Thumbnail-Layer mit Fade-Out
  - Loop aktiviert
  - Vimeos eigenes Thumbnail wird angezeigt (kein lokales Bild)
  
  Einbau in Semplice: Custom Code / HTML-Modul
  Video-ID austauschen in der iframe src (aktuell: 1156843607)
-->

<style>
  /* Cursor erbt vom body (= Custom Website-Cursor) */
  #pw, #pw * { cursor: inherit !important; }
  #pw button { cursor: inherit !important; }

  /* Im Fullscreen: System-Cursor */
  #pw:fullscreen, #pw:fullscreen *,
  #pw:-webkit-full-screen, #pw:-webkit-full-screen * {
    cursor: default !important;
  }
  /* Nach Inaktivität im Fullscreen: ausblenden */
  #pw:fullscreen.idle, #pw:fullscreen.idle *,
  #pw:-webkit-full-screen.idle, #pw:-webkit-full-screen.idle * {
    cursor: none !important;
  }

  #pw:fullscreen,
  #pw:-webkit-full-screen {
    width: 100vw !important;
    height: 100vh !important;
    max-width: none !important;
    background: #000;
  }
  #pw:fullscreen .aspect,
  #pw:-webkit-full-screen .aspect {
    padding-bottom: 0 !important;
    height: 100vh !important;
  }

  /* Thumbnail-Fade */
  #tl {
    transition: opacity .5s ease;
  }
  #tl.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Controls per Opacity */
  #ctrl {
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  #pw.show-ctrl #ctrl {
    opacity: 1;
    pointer-events: auto;
  }

  /* Progressbar */
  #prog {
    flex: 1;
    height: 32px;
    display: flex;
    align-items: center;
    position: relative;
  }
  #prog-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,.25);
    border-radius: 2px;
  }
  #fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

  /* Mobile: Custom Controls und Overlay verstecken */
  #pw.is-mobile #ctrl,
  #pw.is-mobile #ov {
    display: none !important;
  }
</style>

<div id="pw" style="position:relative; width:100%; background:#000; overflow:hidden;">
  <div class="aspect" style="position:relative; padding-bottom:56.25%; height:0;">
    <iframe id="vf"
      src="https://player.vimeo.com/video/1156843607?autoplay=0&controls=0&title=0&byline=0&portrait=0&dnt=1&loop=1"
      style="position:absolute; inset:0; width:100%; height:100%; border:0;"
      allow="autoplay; fullscreen">
    </iframe>
    <div id="ov" style="display:none; position:absolute; inset:0; z-index:4;"></div>
  </div>

  <!-- Play-Overlay (Vimeo zeigt sein eigenes Thumbnail dahinter) -->
  <div id="tl" style="position:absolute; inset:0; z-index:5; display:flex; align-items:center; justify-content:center; background:transparent;">
    <div id="tl-btn" style="width:56px; height:56px; border:1.5px solid rgba(255,255,255,.9); border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.3); backdrop-filter:blur(8px); z-index:1; transition:transform .2s;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white" style="margin-left:3px;"><polygon points="5,3 19,12 5,21"/></svg>
    </div>
  </div>

  <!-- Custom Controls (nur Desktop) -->
  <div id="ctrl" style="position:absolute; bottom:0; left:0; right:0; z-index:6; padding:24px 14px 14px; display:flex; flex-direction:row; align-items:center; gap:10px;">
    <div id="prog">
      <div id="prog-track">
        <div id="fill"></div>
      </div>
    </div>
    <button id="fs" style="background:none; border:none; padding:4px; display:flex; opacity:.75; flex-shrink:0;">
      <svg id="fs-icon" width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
  // Mobile-Detection
  var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                 || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

  var P=null, playing=false, dur=0, inFS=false, hideTimer=null, started=false;
  var vf   = document.getElementById('vf'),
      tl   = document.getElementById('tl'),
      tlb  = document.getElementById('tl-btn'),
      ov   = document.getElementById('ov'),
      prog = document.getElementById('prog'),
      fill = document.getElementById('fill'),
      fs   = document.getElementById('fs'),
      fsIc = document.getElementById('fs-icon'),
      ctrl = document.getElementById('ctrl'),
      pw   = document.getElementById('pw');

  var FE = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>',
      FX = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';

  // Mobile: Vimeos eigene Controls aktivieren
  if (isMobile) {
    pw.classList.add('is-mobile');
    vf.src = vf.src.replace('controls=0', 'controls=1');
  }

  // Player früh initialisieren (Pflicht für Sound auf Mobile)
  P = new Vimeo.Player(vf);
  P.getDuration().then(function(d) { dur = d; });
  P.on('timeupdate', function(d) {
    fill.style.width = (d.seconds / d.duration * 100) + '%';
  });

  function showUI() {
    if (!started || isMobile) return;
    pw.classList.add('show-ctrl');
    pw.classList.remove('idle');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      pw.classList.remove('show-ctrl');
      if (inFS) pw.classList.add('idle');
    }, 2500);
  }

  if (!isMobile) {
    pw.addEventListener('mousemove', showUI);
    pw.addEventListener('mouseleave', function() {
      if (inFS) return;
      pw.classList.remove('show-ctrl');
      pw.classList.remove('idle');
      clearTimeout(hideTimer);
    });
    tl.addEventListener('mouseenter', function() { tlb.style.transform = 'scale(1.08)'; });
    tl.addEventListener('mouseleave', function() { tlb.style.transform = 'scale(1)'; });
  }

  tl.addEventListener('click', function() {
    tl.classList.add('hidden');
    started = true;
    if (!isMobile) ov.style.display = 'block';
    P.play();
    playing = true;
    showUI();
  });

  ov.addEventListener('click', function() {
    if (!P) return;
    playing ? P.pause() : P.play();
    playing = !playing;
    showUI();
  });

  prog.addEventListener('click', function(e) {
    e.stopPropagation();
    if (!P || !dur) return;
    var r = prog.getBoundingClientRect(), pct = (e.clientX - r.left) / r.width;
    pct = Math.max(0, Math.min(1, pct));
    P.setCurrentTime(pct * dur);
    fill.style.width = (pct * 100) + '%';
  });

  fs.addEventListener('click', function(e) {
    e.stopPropagation();
    var isFS = document.fullscreenElement || document.webkitFullscreenElement;
    if (!isFS) {
      if (pw.requestFullscreen) pw.requestFullscreen();
      else if (pw.webkitRequestFullscreen) pw.webkitRequestFullscreen();
      else if (P && P.requestFullscreen) P.requestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  });

  function onFSChange() {
    inFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsIc.innerHTML = inFS ? FX : FE;
    if (inFS) showUI();
    else {
      pw.classList.remove('idle');
      pw.classList.remove('show-ctrl');
    }
  }
  document.addEventListener('fullscreenchange', onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);
</script>
